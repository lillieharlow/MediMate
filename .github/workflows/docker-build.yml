name: Build Docker Images for DevOps Assessment 1

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Load backend version from package.json
        run: BACKEND_VERSION=$(jq -r .version MediMate-Back-End-Web-App/package.json) && echo "BACKEND_VERSION=$BACKEND_VERSION" >> $GITHUB_ENV

      - name: Load frontend version from package.json
        run: FRONTEND_VERSION=$(jq -r .version MediMate-Front-End-Web-App/package.json) && echo "FRONTEND_VERSION=$FRONTEND_VERSION" >> $GITHUB_ENV

      - name: Inject backend secrets
        run: |
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > MediMate-Back-End-Web-App/.env.prod
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> MediMate-Back-End-Web-App/.env.prod
          echo "NODE_ENV=prod" >> MediMate-Back-End-Web-App/.env.prod
          echo "PORT=5000" >> MediMate-Back-End-Web-App/.env.prod
          echo "APP_VERSION=${{ env.BACKEND_VERSION }}" >> MediMate-Back-End-Web-App/.env.prod

      - name: Inject frontend secrets
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > MediMate-Front-End-Web-App/.env.prod
          echo "NODE_ENV=prod" >> MediMate-Front-End-Web-App/.env.prod
          echo "PORT=5173" >> MediMate-Front-End-Web-App/.env.prod
          echo "APP_VERSION=${{ env.FRONTEND_VERSION }}" >> MediMate-Front-End-Web-App/.env.prod

      - name: Build prod backend image
        run: docker build -f MediMate-Back-End-Web-App/Dockerfile.prod -t medimate-backend:${{ env.BACKEND_VERSION }}-prod MediMate-Back-End-Web-App

      - name: Build prod frontend image
        run: docker build -f MediMate-Front-End-Web-App/Dockerfile.prod -t medimate-frontend:${{ env.FRONTEND_VERSION }}-prod MediMate-Front-End-Web-App
